name: Build & publish release branch

# Cada push a `main` (o trigger manual desde la pestaña Actions) construye
# el plugin completo y publica el árbol listo-para-instalar como un commit
# orphan en la rama `release`. El usuario puede ir a GitHub, cambiar a la
# rama `release`, hacer "Code → Download ZIP" y subir ese ZIP a WordPress
# vía "Plugins → Añadir nuevo → Subir plugin".
#
# Tag opcional: si el push viene con un tag tipo `v0.1.0`, también se
# crea un GitHub Release con el ZIP adjunto para descarga versionada.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  # Evita publicar dos releases en paralelo si llegan dos pushes muy
  # seguidos — el último gana.
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, mysqli, json
          tools: composer:v2
          coverage: none

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build distributable tree
        run: bin/build-release.sh --zip

      - name: Publish to release branch
        # Push del subdirectorio build/imagina-crm como root de la rama
        # `release`. Cada release es un commit orphan — la rama no
        # acumula histórico (siempre es un único commit con la build
        # más reciente). Eso mantiene el "Download ZIP" liviano.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd build/imagina-crm

          git init -q -b release
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Release build for ${GITHUB_SHA::7}

          Source: ${GITHUB_REF}
          Built at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Push --force al branch `release` del repo origen.
          git push -f \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
              release:release

      - name: Create GitHub Release for tags
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/imagina-crm.zip
          name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
